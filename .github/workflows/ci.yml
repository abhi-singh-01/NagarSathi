name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  backend:
    name: Backend (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker:
    name: Backend Docker build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nagarsathi-api:ci ./backend
